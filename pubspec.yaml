name: english_chat
description: A premier real-time Flutter chat application designed for learning and practicing English with interactive chats, translation helpers, and Firebase.
version: 1.1.0+2

environment:
  sdk: ">=3.24.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core and Services
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.2
  firebase_messaging: ^15.1.3

  # ZEGOCLOUD Real-time Call & Video SDK
  zego_uikit_prebuilt_call: ^5.0.0

  # Local Persistence, State & Utilities
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1
  flutter_local_notifications: ^17.2.2
  emoji_picker_flutter: ^3.0.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  image_picker: ^1.1.2
  uuid: ^4.4.0
  flutter_sound: ^9.12.2
  permission_handler: ^11.3.1
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
